
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PhoneIntel — Number Lookup & Validation</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #080c10;
  --surface: #0d1318;
  --surface2: #121a22;
  --border: #1e2d3d;
  --accent: #00e5ff;
  --accent2: #39ff14;
  --accent3: #ff6b35;
  --text: #c9d6e3;
  --text-dim: #5a7a8f;
  --valid: #39ff14;
  --invalid: #ff3d57;
  --mono: 'Share Tech Mono', monospace;
  --display: 'Barlow Condensed', sans-serif;
  --body: 'Barlow', sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--body);
  min-height: 100vh;
  overflow-x: hidden;
}

/* Background grid */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(0,229,255,.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,229,255,.03) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  z-index: 0;
}

.container { max-width: 1100px; margin: 0 auto; padding: 0 20px; position: relative; z-index: 1; }

/* Header */
header {
  border-bottom: 1px solid var(--border);
  padding: 28px 0 20px;
  margin-bottom: 40px;
  position: relative;
}
header::after {
  content: '';
  position: absolute;
  bottom: -1px;
  left: 0;
  width: 200px;
  height: 1px;
  background: var(--accent);
  box-shadow: 0 0 12px var(--accent);
}
.header-inner { display: flex; align-items: flex-end; gap: 20px; justify-content: space-between; flex-wrap: wrap; }
.logo {
  font-family: var(--display);
  font-size: 2.8rem;
  font-weight: 900;
  letter-spacing: 2px;
  line-height: 1;
  color: #fff;
  text-transform: uppercase;
}
.logo span { color: var(--accent); }
.logo-sub {
  font-family: var(--mono);
  font-size: 0.72rem;
  color: var(--text-dim);
  letter-spacing: 4px;
  margin-top: 4px;
  text-transform: uppercase;
}
.badge {
  font-family: var(--mono);
  font-size: 0.65rem;
  padding: 4px 10px;
  border: 1px solid var(--accent);
  color: var(--accent);
  letter-spacing: 2px;
  text-transform: uppercase;
}

/* API Key Bar */
.apikey-bar {
  background: var(--surface);
  border: 1px solid var(--border);
  border-left: 3px solid var(--accent);
  padding: 16px 20px;
  margin-bottom: 32px;
  display: flex;
  align-items: center;
  gap: 16px;
  flex-wrap: wrap;
}
.apikey-label {
  font-family: var(--mono);
  font-size: 0.75rem;
  color: var(--accent);
  letter-spacing: 2px;
  white-space: nowrap;
}
.apikey-bar input {
  flex: 1;
  min-width: 240px;
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: var(--mono);
  font-size: 0.85rem;
  padding: 8px 12px;
  outline: none;
  transition: border-color .2s;
}
.apikey-bar input:focus { border-color: var(--accent); box-shadow: 0 0 8px rgba(0,229,255,.15); }
.apikey-bar input::placeholder { color: var(--text-dim); }
.key-status { font-family: var(--mono); font-size: 0.72rem; color: var(--text-dim); }
.key-status.set { color: var(--valid); }

/* Tabs */
.tabs {
  display: flex;
  gap: 0;
  margin-bottom: 28px;
  border-bottom: 1px solid var(--border);
}
.tab-btn {
  font-family: var(--display);
  font-size: 1rem;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  padding: 12px 28px;
  background: transparent;
  border: none;
  color: var(--text-dim);
  cursor: pointer;
  position: relative;
  transition: color .2s;
}
.tab-btn.active { color: var(--accent); }
.tab-btn.active::after {
  content: '';
  position: absolute;
  bottom: -1px;
  left: 0;
  right: 0;
  height: 2px;
  background: var(--accent);
  box-shadow: 0 0 8px var(--accent);
}
.tab-btn:hover:not(.active) { color: var(--text); }

/* Panels */
.panel { display: none; }
.panel.active { display: block; }

/* Single lookup */
.lookup-card {
  background: var(--surface);
  border: 1px solid var(--border);
  padding: 32px;
  position: relative;
  overflow: hidden;
}
.lookup-card::before {
  content: 'LOOKUP';
  position: absolute;
  top: 16px;
  right: 20px;
  font-family: var(--mono);
  font-size: 0.65rem;
  color: var(--border);
  letter-spacing: 4px;
}
.input-group {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  margin-bottom: 20px;
}
.field-wrap { display: flex; flex-direction: column; gap: 6px; flex: 1; min-width: 200px; }
.field-label {
  font-family: var(--mono);
  font-size: 0.65rem;
  color: var(--text-dim);
  letter-spacing: 3px;
  text-transform: uppercase;
}
input[type="text"], input[type="password"], select {
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: var(--mono);
  font-size: 0.9rem;
  padding: 10px 14px;
  outline: none;
  transition: border-color .2s, box-shadow .2s;
  width: 100%;
}
input[type="text"]:focus, input[type="password"]:focus, select:focus {
  border-color: var(--accent);
  box-shadow: 0 0 10px rgba(0,229,255,.12);
}
input::placeholder { color: var(--text-dim); }
select { cursor: pointer; }
select option { background: var(--surface2); }

.btn {
  font-family: var(--display);
  font-size: 0.95rem;
  font-weight: 700;
  letter-spacing: 3px;
  text-transform: uppercase;
  padding: 12px 28px;
  border: none;
  cursor: pointer;
  transition: all .2s;
  display: inline-flex;
  align-items: center;
  gap: 8px;
}
.btn-primary {
  background: var(--accent);
  color: #000;
}
.btn-primary:hover {
  background: #fff;
  box-shadow: 0 0 20px rgba(0,229,255,.4);
}
.btn-primary:disabled {
  opacity: .4;
  cursor: not-allowed;
}
.btn-success {
  background: var(--accent2);
  color: #000;
}
.btn-success:hover { box-shadow: 0 0 20px rgba(57,255,20,.4); }
.btn-outline {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-dim);
}
.btn-outline:hover { border-color: var(--accent); color: var(--accent); }

/* Result card */
.result-card {
  margin-top: 28px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-top: 2px solid var(--accent);
  padding: 28px;
  animation: fadeSlide .3s ease;
}
@keyframes fadeSlide {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
.result-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 24px;
  flex-wrap: wrap;
  gap: 12px;
}
.result-number {
  font-family: var(--mono);
  font-size: 1.5rem;
  color: #fff;
  letter-spacing: 1px;
}
.validity-badge {
  font-family: var(--display);
  font-size: 0.85rem;
  font-weight: 700;
  letter-spacing: 3px;
  padding: 6px 16px;
  text-transform: uppercase;
}
.validity-badge.valid {
  background: rgba(57,255,20,.1);
  color: var(--valid);
  border: 1px solid var(--valid);
  box-shadow: 0 0 12px rgba(57,255,20,.2);
}
.validity-badge.invalid {
  background: rgba(255,61,87,.1);
  color: var(--invalid);
  border: 1px solid var(--invalid);
}

.result-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 16px;
}
.result-item { display: flex; flex-direction: column; gap: 4px; }
.result-item-key {
  font-family: var(--mono);
  font-size: 0.65rem;
  color: var(--text-dim);
  letter-spacing: 3px;
  text-transform: uppercase;
}
.result-item-val {
  font-family: var(--mono);
  font-size: 0.92rem;
  color: var(--text);
}
.result-item-val.highlight { color: var(--accent); }
.result-item-val.empty { color: var(--text-dim); font-style: italic; }

/* Bulk upload */
.upload-zone {
  border: 2px dashed var(--border);
  padding: 48px 32px;
  text-align: center;
  cursor: pointer;
  transition: all .2s;
  position: relative;
  background: var(--surface);
}
.upload-zone:hover, .upload-zone.drag { border-color: var(--accent); background: rgba(0,229,255,.03); }
.upload-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
.upload-icon { font-size: 2.5rem; margin-bottom: 12px; }
.upload-title {
  font-family: var(--display);
  font-size: 1.3rem;
  font-weight: 700;
  letter-spacing: 2px;
  color: #fff;
  margin-bottom: 6px;
}
.upload-hint { font-size: 0.85rem; color: var(--text-dim); font-family: var(--mono); }
.file-chosen {
  font-family: var(--mono);
  font-size: 0.8rem;
  color: var(--accent);
  margin-top: 10px;
}

.bulk-options {
  display: flex;
  gap: 16px;
  align-items: flex-end;
  flex-wrap: wrap;
  margin: 20px 0;
}

/* Progress */
.progress-wrap { margin: 20px 0; display: none; }
.progress-label {
  font-family: var(--mono);
  font-size: 0.72rem;
  color: var(--text-dim);
  letter-spacing: 2px;
  margin-bottom: 8px;
}
.progress-bar-bg {
  background: var(--border);
  height: 3px;
  width: 100%;
}
.progress-bar-fill {
  height: 3px;
  background: var(--accent);
  box-shadow: 0 0 8px var(--accent);
  transition: width .3s;
}

/* Stats row */
.stats-row {
  display: flex;
  gap: 20px;
  margin: 24px 0 16px;
  flex-wrap: wrap;
}
.stat-box {
  background: var(--surface);
  border: 1px solid var(--border);
  padding: 16px 24px;
  min-width: 140px;
}
.stat-val {
  font-family: var(--display);
  font-size: 2rem;
  font-weight: 900;
  line-height: 1;
}
.stat-val.cyan { color: var(--accent); }
.stat-val.green { color: var(--valid); }
.stat-val.red { color: var(--invalid); }
.stat-key {
  font-family: var(--mono);
  font-size: 0.65rem;
  color: var(--text-dim);
  letter-spacing: 3px;
  text-transform: uppercase;
  margin-top: 4px;
}

/* Table */
.table-wrap {
  overflow-x: auto;
  border: 1px solid var(--border);
}
table {
  width: 100%;
  border-collapse: collapse;
  font-family: var(--mono);
  font-size: 0.78rem;
}
thead tr {
  background: var(--surface2);
  border-bottom: 1px solid var(--border);
}
th {
  padding: 10px 14px;
  text-align: left;
  color: var(--accent);
  letter-spacing: 2px;
  font-size: 0.65rem;
  text-transform: uppercase;
  white-space: nowrap;
}
tbody tr {
  border-bottom: 1px solid rgba(30,45,61,.6);
  transition: background .15s;
}
tbody tr:hover { background: var(--surface2); }
td {
  padding: 10px 14px;
  color: var(--text);
  white-space: nowrap;
}
td.valid-cell { color: var(--valid); }
td.invalid-cell { color: var(--invalid); }
td.dim { color: var(--text-dim); }

/* Download bar */
.download-bar {
  display: flex;
  gap: 12px;
  align-items: center;
  padding: 16px 0;
  flex-wrap: wrap;
}

/* Error / info */
.alert {
  padding: 12px 16px;
  border-left: 3px solid;
  font-family: var(--mono);
  font-size: 0.82rem;
  margin: 16px 0;
}
.alert-error { border-color: var(--invalid); background: rgba(255,61,87,.07); color: var(--invalid); }
.alert-info { border-color: var(--accent); background: rgba(0,229,255,.05); color: var(--accent); }

/* Spinner */
.spinner {
  width: 16px; height: 16px;
  border: 2px solid rgba(0,229,255,.2);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin .6s linear infinite;
  display: inline-block;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Footer */
footer {
  margin-top: 60px;
  padding: 24px 0;
  border-top: 1px solid var(--border);
  font-family: var(--mono);
  font-size: 0.7rem;
  color: var(--text-dim);
  text-align: center;
  letter-spacing: 2px;
}
footer a { color: var(--accent); text-decoration: none; }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="header-inner">
      <div>
        <div class="logo">Phone<span>Intel</span></div>
        <div class="logo-sub">Global Number Validation &amp; Lookup</div>
      </div>
      <div class="badge">Powered by Numverify</div>
    </div>
  </header>

  <!-- API Key -->
  <div class="apikey-bar">
    <span class="apikey-label">API_KEY</span>
    <input type="password" id="apiKeyInput" placeholder="Enter your Numverify API key..." autocomplete="off"/>
    <span class="key-status" id="keyStatus">NOT SET</span>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab-btn active" data-tab="single">Single Lookup</button>
    <button class="tab-btn" data-tab="bulk">Bulk CSV</button>
  </div>

  <!-- SINGLE -->
  <div class="panel active" id="panel-single">
    <div class="lookup-card">
      <div class="input-group">
        <div class="field-wrap" style="flex:2">
          <label class="field-label">Phone Number</label>
          <input type="text" id="phoneInput" placeholder="+14158586273 or 14158586273"/>
        </div>
        <div class="field-wrap">
          <label class="field-label">Country Code (optional)</label>
          <input type="text" id="countryInput" placeholder="US, DE, GB…" maxlength="3"/>
        </div>
      </div>
      <button class="btn btn-primary" id="lookupBtn" onclick="doSingleLookup()">
        <span id="lookupBtnTxt">Lookup</span>
      </button>
      <div id="singleError"></div>
      <div id="singleResult"></div>
    </div>
  </div>

  <!-- BULK -->
  <div class="panel" id="panel-bulk">

    <div class="upload-zone" id="uploadZone">
      <input type="file" id="csvFile" accept=".csv,.txt" onchange="onFileChosen(event)"/>
      <div class="upload-icon">📂</div>
      <div class="upload-title">Drop CSV File Here</div>
      <div class="upload-hint">or click to browse — expects a column named phone, number, mobile, etc.</div>
      <div class="file-chosen" id="fileChosen"></div>
    </div>

    <div class="bulk-options">
      <div class="field-wrap">
        <label class="field-label">Country Code (optional, applies to all)</label>
        <input type="text" id="bulkCountry" placeholder="US, DE, GB…" maxlength="3" style="width:160px"/>
      </div>
      <button class="btn btn-primary" id="bulkBtn" onclick="doBulkValidate()">
        <span id="bulkBtnTxt">Validate CSV</span>
      </button>
    </div>

    <div class="progress-wrap" id="progressWrap">
      <div class="progress-label" id="progressLabel">Processing…</div>
      <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressFill" style="width:0%"></div></div>
    </div>

    <div id="bulkError"></div>
    <div id="bulkResults"></div>
  </div>

</div>

<footer>
  PhoneIntel &mdash; Built on <a href="https://numverify.com" target="_blank">Numverify API</a> &mdash; FastAPI + Bootstrap
</footer>

<script>
// ----- API Key -----
const apiKeyInput = document.getElementById('apiKeyInput');
const keyStatus = document.getElementById('keyStatus');

apiKeyInput.addEventListener('input', () => {
  const v = apiKeyInput.value.trim();
  keyStatus.textContent = v ? '● SET' : 'NOT SET';
  keyStatus.className = 'key-status' + (v ? ' set' : '');
});

function getKey() {
  const k = apiKeyInput.value.trim();
  if (!k) { alert('Please enter your Numverify API key first.'); return null; }
  return k;
}

// ----- Tabs -----
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('panel-' + btn.dataset.tab).classList.add('active');
  });
});

// ----- Single Lookup -----
async function doSingleLookup() {
  const key = getKey(); if (!key) return;
  const phone = document.getElementById('phoneInput').value.trim();
  const country = document.getElementById('countryInput').value.trim();
  if (!phone) { showError('singleError', 'Please enter a phone number.'); return; }

  const btn = document.getElementById('lookupBtn');
  document.getElementById('lookupBtnTxt').innerHTML = '<span class="spinner"></span>';
  btn.disabled = true;
  clearEl('singleError'); clearEl('singleResult');

  try {
    const params = new URLSearchParams({ phone, country_code: country, api_key: key });
    const resp = await fetch('/api/validate?' + params);
    const data = await resp.json();
    if (!resp.ok) throw new Error(data.detail || 'Error');
    renderSingleResult(data);
  } catch(e) {
    showError('singleError', e.message);
  } finally {
    document.getElementById('lookupBtnTxt').textContent = 'Lookup';
    btn.disabled = false;
  }
}

document.getElementById('phoneInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') doSingleLookup();
});

function renderSingleResult(d) {
  const isValid = d.valid;
  const fields = [
    { key: 'International Format', val: d.international_format },
    { key: 'Local Format', val: d.local_format },
    { key: 'Country', val: d.country_name },
    { key: 'Country Code', val: d.country_code },
    { key: 'Prefix', val: d.country_prefix },
    { key: 'Location', val: d.location },
    { key: 'Carrier', val: d.carrier },
    { key: 'Line Type', val: d.line_type },
  ];

  const html = `
    <div class="result-card">
      <div class="result-header">
        <div class="result-number">${esc(d.number)}</div>
        <div class="validity-badge ${isValid ? 'valid' : 'invalid'}">${isValid ? '✓ Valid' : '✗ Invalid'}</div>
      </div>
      <div class="result-grid">
        ${fields.map(f => `
          <div class="result-item">
            <div class="result-item-key">${f.key}</div>
            <div class="result-item-val ${f.val ? (f.key==='Line Type'||f.key==='Carrier'?'highlight':'') : 'empty'}">${f.val || '—'}</div>
          </div>
        `).join('')}
      </div>
    </div>`;
  document.getElementById('singleResult').innerHTML = html;
}

// ----- Bulk CSV -----
let bulkData = null;

function onFileChosen(e) {
  const f = e.target.files[0];
  document.getElementById('fileChosen').textContent = f ? '📄 ' + f.name : '';
}

// Drag & drop
const zone = document.getElementById('uploadZone');
zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag'); });
zone.addEventListener('dragleave', () => zone.classList.remove('drag'));
zone.addEventListener('drop', e => {
  e.preventDefault(); zone.classList.remove('drag');
  const f = e.dataTransfer.files[0];
  if (f) {
    const input = document.getElementById('csvFile');
    const dt = new DataTransfer(); dt.items.add(f); input.files = dt.files;
    document.getElementById('fileChosen').textContent = '📄 ' + f.name;
  }
});

async function doBulkValidate() {
  const key = getKey(); if (!key) return;
  const fileInput = document.getElementById('csvFile');
  if (!fileInput.files[0]) { showError('bulkError', 'Please select a CSV file.'); return; }

  const btn = document.getElementById('bulkBtn');
  document.getElementById('bulkBtnTxt').innerHTML = '<span class="spinner"></span> Validating…';
  btn.disabled = true;
  clearEl('bulkError'); clearEl('bulkResults');

  const progressWrap = document.getElementById('progressWrap');
  progressWrap.style.display = 'block';
  document.getElementById('progressFill').style.width = '30%';
  document.getElementById('progressLabel').textContent = 'Uploading & processing…';

  try {
    const formData = new FormData();
    formData.append('file', fileInput.files[0]);

    const country = document.getElementById('bulkCountry').value.trim();
    const params = new URLSearchParams({ api_key: key, country_code: country });

    // Animate progress
    let pct = 30;
    const ticker = setInterval(() => {
      pct = Math.min(pct + 2, 85);
      document.getElementById('progressFill').style.width = pct + '%';
    }, 400);

    const resp = await fetch('/api/validate-bulk?' + params, { method: 'POST', body: formData });
    clearInterval(ticker);
    document.getElementById('progressFill').style.width = '100%';

    const data = await resp.json();
    if (!resp.ok) throw new Error(data.detail || 'Error');

    bulkData = data.results;
    renderBulkResults(data);
  } catch(e) {
    showError('bulkError', e.message);
  } finally {
    document.getElementById('bulkBtnTxt').textContent = 'Validate CSV';
    btn.disabled = false;
    setTimeout(() => { progressWrap.style.display = 'none'; }, 800);
  }
}

function renderBulkResults(data) {
  const { results, total, valid } = data;
  const invalid = total - valid;

  if (!results.length) {
    document.getElementById('bulkResults').innerHTML = '<div class="alert alert-info">No phone numbers found in the file.</div>';
    return;
  }

  // Column keys for table — show key cols + original
  const displayCols = ['number_display','valid','international_format','country_name','location','carrier','line_type'];
  const allKeys = Object.keys(results[0]);
  const extraKeys = allKeys.filter(k => !['valid','international_format','country_name','location','carrier','line_type','error'].includes(k));

  const html = `
    <div class="stats-row">
      <div class="stat-box"><div class="stat-val cyan">${total}</div><div class="stat-key">Total</div></div>
      <div class="stat-box"><div class="stat-val green">${valid}</div><div class="stat-key">Valid</div></div>
      <div class="stat-box"><div class="stat-val red">${invalid}</div><div class="stat-key">Invalid</div></div>
      <div class="stat-box"><div class="stat-val cyan">${total > 0 ? Math.round(valid/total*100) : 0}%</div><div class="stat-key">Valid Rate</div></div>
    </div>
    <div class="download-bar">
      <button class="btn btn-success" onclick="downloadCSV()">↓ Download Results CSV</button>
      <button class="btn btn-outline" onclick="downloadCSV(true)">↓ Valid Only</button>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            ${extraKeys.map(k => `<th>${esc(k)}</th>`).join('')}
            <th>Valid</th>
            <th>Intl Format</th>
            <th>Country</th>
            <th>Location</th>
            <th>Carrier</th>
            <th>Line Type</th>
            ${results[0].error !== undefined ? '<th>Error</th>' : ''}
          </tr>
        </thead>
        <tbody>
          ${results.map(r => `
            <tr>
              ${extraKeys.map(k => `<td>${esc(r[k] ?? '')}</td>`).join('')}
              <td class="${r.valid ? 'valid-cell' : 'invalid-cell'}">${r.valid ? '✓ YES' : '✗ NO'}</td>
              <td>${esc(r.international_format || '—')}</td>
              <td>${esc(r.country_name || '—')}</td>
              <td class="dim">${esc(r.location || '—')}</td>
              <td>${esc(r.carrier || '—')}</td>
              <td>${esc(r.line_type || '—')}</td>
              ${r.error !== undefined ? `<td class="invalid-cell">${esc(r.error || '')}</td>` : ''}
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>
  `;
  document.getElementById('bulkResults').innerHTML = html;
}

async function downloadCSV(validOnly = false) {
  if (!bulkData) return;
  const data = validOnly ? bulkData.filter(r => r.valid) : bulkData;
  const resp = await fetch('/api/download-csv', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ results: data })
  });
  const blob = await resp.blob();
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = validOnly ? 'valid_numbers.csv' : 'validated_numbers.csv';
  a.click();
  URL.revokeObjectURL(url);
}

// ----- Helpers -----
function showError(id, msg) {
  document.getElementById(id).innerHTML = `<div class="alert alert-error">⚠ ${esc(msg)}</div>`;
}
function clearEl(id) { document.getElementById(id).innerHTML = ''; }
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
</html>
